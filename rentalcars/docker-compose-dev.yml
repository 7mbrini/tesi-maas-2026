services:
  db:
    image: pgrouting/pgrouting:16-3.4-3.6.1
    container_name: rentalcars-db
    restart: unless-stopped
    volumes:
      - rentalcars_postgres_data:/var/lib/postgresql/data
      # L'unica aggiunta necessaria per l'importazione automatica del DB compresso
      - ./rentalcars.sql.gz:/docker-entrypoint-initdb.d/rentalcars.sql.gz
    env_file:
      - path: production.env
        required: false
    environment:
      - POSTGRES_DB=${DB_NAME:-rentalcars}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "5510:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-rentalcars}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: rentalcars-redis
    restart: unless-stopped
    ports:
      - "6510:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: .
    container_name: rentalcars-web
    restart: unless-stopped
    env_file:
      - path: debug.env
        required: false
      - path: production.env
        required: false
    volumes:
      - .:/app
    ports:
      - "8510:8000"
    environment:
      - DB_HOST=db
      - REDIS_HOST=redis
      - PYTHONUNBUFFERED=1
      - DB_NAME=${DB_NAME:-rentalcars}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    # Ripristinato il tuo comando originale identico, senza alcuna modifica all'utente
    command: >
      sh -c "python manage.py migrate --noinput && 
             python manage.py shell -c \"from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin', 'admin@email.com', 'admin')\" && 
             python manage.py runserver 0.0.0.0:8000"

volumes:
  rentalcars_postgres_data:
