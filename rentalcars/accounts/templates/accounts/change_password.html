{% extends 'base.html' %}
{% load static %}

{% block title %} RentalCars | Change Password {% endblock title %}

{% block extra_head %}
    <link rel="stylesheet" href="{% static 'accounts/css/style.css' %}?v=3">
{% endblock extra_head %}

{% block content %}

<div class="container-fluid p-0">

    <header class="hero-minimal text-center mb-2">
        <div class="container">
            <h1 class="page-title mb-0">Change Password</h1>
        </div>
    </header>

    <div class="container">
        <div class="auth-box shadow-sm">
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    {{ form.as_p }}
                </div>

                <div class="mt-3">
                    <button type="submit" class="btn-action-submit shadow-sm">
                        Save new password
                    </button>
                </div>
            </form>

            <div class="text-center mt-3 pt-2 border-top">
                <a href="javascript:history.back()" class="small text-muted text-decoration-none">
                    <i class="bi bi-arrow-left"></i> Back to account
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
